# AutoTrade Pro — Docker Compose
# Database  → local PostgreSQL (Docker)
# Redis     → host redis-server (already running on :6379)
# API       → FastAPI (local dev)
# Workers   → Celery worker + beat

version: "3.9"

services:

  # ── PostgreSQL (local — replaces Supabase) ───────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: autotrade_postgres
    environment:
      POSTGRES_DB:       autotrade_pro
      POSTGRES_USER:     autotrade
      POSTGRES_PASSWORD: autotrade
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d   # SQL dumps restored on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autotrade -d autotrade_pro"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── FastAPI app (local dev only) ──────────────────────────────────────────
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  # ── Celery worker ─────────────────────────────────────────────────────────
  celery_worker:
    build: .
    env_file: .env
    volumes:
      - .:/app
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  # ── Celery beat (periodic scheduler) ────────────────────────────────────
  celery_beat:
    build: .
    env_file: .env
    volumes:
      - .:/app
    command: celery -A tasks.celery_app beat --loglevel=info
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  # ── Adminer (web-based DB browser) ──────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: autotrade_adminer
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
